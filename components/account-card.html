<article class="market-card">
  <div class="market-card-media {{IMAGE_CLASS}}">
    <span class="market-status {{STATUS_CLASS}}">{{STATUS_LABEL}}</span>
    <span class="market-game">{{GAME_NAME}}</span>
  </div>
  <div class="market-card-body">
    <h3 class="market-card-title">{{ACCOUNT_TITLE}}</h3>
    <div class="market-card-meta">
      <span><strong data-i18n="cards.level">Level</strong>: {{LEVEL}}</span>
      <span><strong data-i18n="cards.region">Region</strong>: {{REGION}}</span>
    </div>
    <div class="market-feature-list">{{FEATURE_TAGS}}</div>
    <div class="market-card-footer">
      <div>
        <div class="market-price-label" data-i18n="cards.price">Price</div>
        <div class="market-price">{{PRICE}}</div>
      </div>
      <div class="market-actions">
        <a href="{{CONTACT_URL}}" class="btn btn-info offer-cta" data-i18n="buttons.buyNow">Buy Now</a>
        <a href="{{CONTACT_URL}}" class="btn btn-outline-light offer-cta secondary" data-i18n="buttons.contactUs">Contact Us</a>
      </div>
    </div>
  </div>
</article>
