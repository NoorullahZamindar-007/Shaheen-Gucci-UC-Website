<article class="uc-card {{FEATURED_CLASS}}">
  <div class="uc-card-top">
    <span class="uc-amount">{{UC_AMOUNT}} UC</span>
    {{DISCOUNT_BADGE}}
  </div>
  <div class="uc-price">{{PRICE}}</div>
  <p class="uc-card-note">{{CARD_NOTE}}</p>
  <div class="uc-card-actions">
    <a href="{{CONTACT_URL}}" class="btn btn-info offer-cta" data-i18n="buttons.buyNow">Buy Now</a>
    <a href="{{CONTACT_URL}}" class="btn btn-outline-light offer-cta secondary" data-i18n="buttons.contactUs">Contact Us</a>
  </div>
</article>
