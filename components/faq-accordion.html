<div class="faq-component" data-faq-id="{{FAQ_ID}}">
  <div class="faq-item-panel {{OPEN_CLASS}}">
    <button class="faq-toggle" type="button" aria-expanded="{{ARIA_EXPANDED}}">
      <span>{{QUESTION}}</span>
      <i class="bi bi-plus-lg faq-icon"></i>
    </button>
    <div class="faq-answer" {{ANSWER_STYLE}}>
      <p>{{ANSWER}}</p>
    </div>
  </div>
</div>
